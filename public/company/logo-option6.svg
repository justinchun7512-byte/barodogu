<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100">
  <!-- 시안 6: 퍼즐 조각이 맞춰지는 형태 (모으다 = 조합) -->
  <defs>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- 사각 프레임 -->
  <rect x="8" y="12" width="72" height="72" rx="14" fill="url(#g6)"/>
  <!-- 4분할 퍼즐 -->
  <!-- 좌상 -->
  <rect x="16" y="20" width="26" height="26" rx="4" fill="rgba(255,255,255,0.9)"/>
  <!-- 우상 -->
  <rect x="46" y="20" width="26" height="26" rx="4" fill="rgba(255,255,255,0.6)"/>
  <!-- 좌하 -->
  <rect x="16" y="50" width="26" height="26" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- 우하 (포인트) -->
  <rect x="46" y="50" width="26" height="26" rx="4" fill="#FBBF24"/>
  <!-- 연결 심볼 -->
  <circle cx="42" cy="46" r="6" fill="url(#g6)"/>
  <circle cx="42" cy="46" r="3" fill="white"/>
  <!-- 텍스트 -->
  <text x="98" y="38" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#111827">내일모</text>
  <text x="98" y="62" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#111827">코퍼레이션</text>
  <text x="98" y="82" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2563EB" letter-spacing="1">NAEILMO CORP.</text>
</svg>
