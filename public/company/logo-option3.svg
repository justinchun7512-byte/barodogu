<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- 시안 3: 해가 떠오르는 형태 (내일 = Tomorrow) -->
  <defs>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- 반원 (떠오르는 해) -->
  <rect x="4" y="10" width="76" height="76" rx="16" fill="url(#g3)"/>
  <!-- 해 -->
  <circle cx="42" cy="58" r="16" fill="url(#sun)"/>
  <rect x="4" y="58" width="76" height="28" rx="0" fill="url(#g3)"/>
  <rect x="4" y="78" width="76" height="8" rx="0 0 16 16" fill="url(#g3)"/>
  <!-- 빛줄기 -->
  <line x1="42" y1="30" x2="42" y2="22" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="35" x2="62" y2="29" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="35" x2="22" y2="29" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="48" x2="68" y2="46" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="48" x2="16" y2="46" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 수평선 -->
  <line x1="12" y1="58" x2="72" y2="58" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- 텍스트 -->
  <text x="100" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#111827">내일모코퍼레이션</text>
  <text x="100" y="68" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#6B7280" letter-spacing="1">"내일을 모으다, 오늘을 만들다"</text>
</svg>
