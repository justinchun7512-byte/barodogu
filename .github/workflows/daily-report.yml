name: Daily Report to Telegram

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 0시
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Send Daily Report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d (%a)')

          MESSAGE="📊 <b>[데일리 보고] 바로도구 운영 현황</b>

━━━━━━━━━━━━━━━━━━
📅 ${DATE}
🔗 https://barodogu.com

<b>1. 트래픽 현황</b>
📈 GA4 확인: https://analytics.google.com
• 전일 방문자: GA4에서 확인
• 전일 페이지뷰: GA4에서 확인
• 인기 도구: GA4 > 페이지별 조회수

<b>2. 매출 현황</b>
• AdSense: 미적용 (승인 대기)

<b>3. 마케팅 실행 현황</b>
• 블로그: 발행 현황 확인 필요
• 쇼츠: 제작 현황 확인 필요
• 커뮤니티: 공유 현황 확인 필요

<b>4. 금일 실행 계획</b>
• Phase 2 AI 도구 개발 진행
• SEO 콘텐츠 발행
• 커뮤니티 공유

<b>5. 핵심 지표 체크리스트</b>
☐ GA4 방문자 수 확인
☐ Search Console 검색 노출 확인
☐ 블로그 콘텐츠 1편 발행
☐ 커뮤니티 1회 공유

━━━━━━━━━━━━━━━━━━
💡 상세 분석은 Claude Code 세션에서 확인하세요.
내일모코퍼레이션 전략총괄"

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=${MESSAGE}"
